<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krnet - Projets démo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F0E8; color: #1A1A1A; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; padding: 40px; max-width: 400px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.5; }
    .btn { display: inline-block; background: #F5C518; color: #1A1A1A; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; }
    .btn:hover { background: #e0b015; }
    .hint { font-size: 13px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Krnet</h1>
    <p>Projet de démonstration pour diagnostic amiante.</p>
    <a class="btn" href="demo/diagnostic-amiante.zip" download>Télécharger le projet démo</a>
    <p class="hint">Scannez le QR code depuis l'application Krnet pour importer automatiquement ce projet.</p>
  </div>
</body>
</html>
