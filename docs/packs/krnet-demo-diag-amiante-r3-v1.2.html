<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krnet - QR code projet démo (diagnostic amiante r3)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F0E8; color: #1A1A1A; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 24px; line-height: 1.5; }
    .qr { display: flex; justify-content: center; margin: 0 auto 24px; padding: 16px; background: #fff; border: 1px solid #eee; border-radius: 8px; width: fit-content; }
    .qr img, .qr canvas { display: block; }
    .url { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: #555; word-break: break-all; background: #F5F0E8; padding: 10px 12px; border-radius: 6px; margin-bottom: 20px; }
    .btn { display: inline-block; background: #F5C518; color: #1A1A1A; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; }
    .btn:hover { background: #e0b015; }
    .hint { font-size: 13px; color: #999; margin-top: 16px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Diagnostic amiante — r3</h1>
    <p class="subtitle">Scannez ce QR code depuis l'application Krnet pour importer le projet démo.</p>
    <div class="qr"><div id="qrcode"></div></div>
    <div class="url" id="zipUrl"></div>
    <a class="btn" href="krnet-demo-diag-amiante-r3-v1.2.zip" download>Télécharger le .zip</a>
    <p class="hint">v1.2 · krnet-demo-diag-amiante-r3-v1.2.zip</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    (function () {
      var zipName = 'krnet-demo-diag-amiante-r3-v1.2.zip';
      var zipUrl = new URL(zipName, window.location.href).href;
      document.getElementById('zipUrl').textContent = zipUrl;
      new QRCode(document.getElementById('qrcode'), {
        text: zipUrl,
        width: 240,
        height: 240,
        colorDark: '#1A1A1A',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M
      });
    })();
  </script>
</body>
</html>
